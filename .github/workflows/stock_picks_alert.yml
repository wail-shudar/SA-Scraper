name: Stock Picks Top 10 Alert

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-picks-top-10-alert
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_WRITE_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check top 10 rows and send email if changed
        env:
          SA_COOKIE: ${{ secrets.SA_COOKIE }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          SMTP_USE_STARTTLS: ${{ secrets.SMTP_USE_STARTTLS }}
        run: python stock_picks_alert.py

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/undercovered_stocks_top10.csv; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "Wail"
          git config user.email "hello@shudar.com"
          git add data/undercovered_stocks_top10.csv
          git commit -m "Update top 10 stock snapshot [skip ci]"
          git push origin HEAD:${{ github.ref_name }}